name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do to trigger this?
      placeholder: |
        1. Ran setup.sh
        2. Opened https://localhost
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, browser, etc.
      placeholder: |
        OS: Ubuntu 24.04
        Docker: 27.x
        Browser: Chrome 130
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Paste relevant output from: docker compose logs"
      render: shell
    validations:
      required: false
