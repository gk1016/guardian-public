name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PR branches are validated via the pull_request event (no duplicate push run).
# Supersede stale runs for the same ref, but never cancel main runs so every
# merge still produces its image.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Detect which side changed so rust/frontend can skip their heavy steps.
  # The jobs still RUN (so the required checks always report), they just no-op
  # the expensive work when their area is untouched.
  changes:
    runs-on: ubuntu-latest
    # dorny/paths-filter queries the PR's changed files via the API on
    # pull_request events; without this it fails "Resource not accessible".
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.f.outputs.rust }}
      frontend: ${{ steps.f.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            rust:
              - 'guardian-engine/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'guardian-spa/**'
              - '.github/workflows/ci.yml'

  rust:
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: guardian-engine
    steps:
      - uses: actions/checkout@v6
      # guardian-engine is NON-FIPS (rustls + ring). Build deps for ring / -sys
      # crates; golang/nasm intentionally omitted (those are aws-lc-rs only).
      - name: Install build deps
        if: needs.changes.outputs.rust == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake clang libclang-dev pkg-config libssl-dev perl
      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.rust == 'true'
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.rust == 'true'
        with:
          workspaces: guardian-engine
      # Blocking: must compile + tests must pass (workspace covers engine + comms).
      - name: cargo check
        if: needs.changes.outputs.rust == 'true'
        run: cargo check --locked
      - name: cargo test
        if: needs.changes.outputs.rust == 'true'
        run: cargo test --locked
      # Advisory.
      - name: cargo fmt --check
        if: needs.changes.outputs.rust == 'true'
        run: cargo fmt --check
        continue-on-error: true
      - name: cargo clippy
        if: needs.changes.outputs.rust == 'true'
        run: cargo clippy --all-targets
        continue-on-error: true

  frontend:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version: "22"
      - name: install deps
        if: needs.changes.outputs.frontend == 'true'
        working-directory: guardian-spa
        run: npm ci
      # Blocking: the SPA type-checks clean as of the review fixes; keep it that way.
      - name: type-check
        if: needs.changes.outputs.frontend == 'true'
        working-directory: guardian-spa
        run: npx tsc -b
      # Blocking: must bundle (this is exactly what guardian-engine/Dockerfile runs).
      - name: build SPA
        if: needs.changes.outputs.frontend == 'true'
        working-directory: guardian-spa
        run: npx vite build

  # Build the image and push to Docker Hub — ONLY on main, ONLY when code
  # changed, ONLY after rust passes. nucbox no longer builds; it just pulls.
  docker:
    if: github.ref == 'refs/heads/main' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true')
    needs: [changes, rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Compute image tag
        id: tag
        run: echo "sha=git-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: grahamkyle18
          password: ${{ secrets.DOCKERHUB_SECRET }}
      - name: Build and push guardian-engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: guardian-engine/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
          tags: |
            grahamkyle18/guardian-engine:latest
            grahamkyle18/guardian-engine:${{ steps.tag.outputs.sha }}
