services:
  guardian:
    image: ghcr.io/gk1016/guardian-flight:latest
    container_name: guardian
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      HOSTNAME: "0.0.0.0"
    depends_on:
      guardian-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  guardian-engine:
    image: ghcr.io/gk1016/guardian-engine:latest
    container_name: guardian-engine
    restart: unless-stopped
    expose:
      - "3420"
    ports:
      - "0.0.0.0:3421:3421"
    environment:
      ENGINE_PORT: "3420"
      FEDERATION_PORT: "3421"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@guardian-postgres:5432/${POSTGRES_DB}"
      GUARDIAN_INSTANCE_NAME: "${GUARDIAN_INSTANCE_NAME:-guardian-primary}"
      GUARDIAN_CERT_DIR: "/data/guardian/certs"
      RUST_LOG: "guardian_engine=info,tower_http=info"
      AUTH_SECRET: "${AUTH_SECRET}"
    volumes:
      - guardian-engine-certs:/data/guardian/certs
    depends_on:
      guardian-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3420/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  guardian-backup:
    image: postgres:16-bookworm
    container_name: guardian-backup
    restart: unless-stopped
    environment:
      PGHOST: guardian-postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
    volumes:
      - guardian-backups:/backups
    depends_on:
      guardian-postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Guardian backup sidecar started (interval: $${BACKUP_INTERVAL_HOURS}h, retention: $${BACKUP_RETENTION_DAYS}d)"
        sleep 60
        while true; do
          TIMESTAMP=$$(date +%Y%m%d-%H%M%S)
          DUMP="/backups/$${PGDATABASE}-$${TIMESTAMP}.sql.gz"
          pg_dump -h "$$PGHOST" -U "$$PGUSER" "$$PGDATABASE" | gzip > "$$DUMP"
          if [ -s "$$DUMP" ]; then
            echo "OK: $$DUMP ($$(du -h "$$DUMP" | cut -f1))"
          else
            echo "ERROR: backup produced empty file" >&2
            rm -f "$$DUMP"
          fi
          find /backups -name "*.sql.gz" -mtime +$${BACKUP_RETENTION_DAYS} -delete
          echo "Backups on disk: $$(find /backups -name '*.sql.gz' | wc -l)"
          sleep $$((BACKUP_INTERVAL_HOURS * 3600))
        done

  guardian-tools:
    image: ghcr.io/gk1016/guardian-flight:latest
    profiles: ["tools"]
    env_file:
      - .env
    depends_on:
      guardian-postgres:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command: ["npx prisma db push && npm run db:seed"]

  guardian-postgres:
    image: postgres:16-bookworm
    container_name: guardian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - guardian-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2
    container_name: guardian-caddy
    restart: unless-stopped
    ports:
      - "${HTTPS_PORT:-443}:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - guardian
      - guardian-engine

volumes:
  guardian-postgres-data:
  guardian-engine-certs:
  guardian-backups:
  caddy_data:
