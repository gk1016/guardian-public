services:
  guardian:
    build: .
    container_name: guardian
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      guardian-postgres:
        condition: service_healthy

  guardian-engine:
    build:
      context: ./guardian-engine
      dockerfile: Dockerfile
    container_name: guardian-engine
    restart: unless-stopped
    expose:
      - "3420"
    ports:
      - "0.0.0.0:3421:3421"
    environment:
      ENGINE_PORT: "3420"
      FEDERATION_PORT: "3421"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-guardian}:${POSTGRES_PASSWORD:-guardian_dev}@guardian-postgres:5432/${POSTGRES_DB:-guardian}"
      GUARDIAN_INSTANCE_NAME: "${GUARDIAN_INSTANCE_NAME:-guardian-primary}"
      GUARDIAN_CERT_DIR: "/data/guardian/certs"
      RUST_LOG: "guardian_engine=info,tower_http=info"
    volumes:
      - guardian-engine-certs:/data/guardian/certs
    depends_on:
      guardian-postgres:
        condition: service_healthy

  guardian-tools:
    build:
      context: .
      target: builder
    profiles: ["tools"]
    env_file:
      - .env
    depends_on:
      guardian-postgres:
        condition: service_healthy
    command: sh -lc "npx prisma db push && npm run db:seed"

  guardian-postgres:
    image: postgres:16-alpine
    container_name: guardian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-guardian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardian_dev}
      POSTGRES_DB: ${POSTGRES_DB:-guardian}
    expose:
      - "5432"
    volumes:
      - guardian-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guardian}"]
      interval: 5s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    container_name: guardian-caddy
    restart: unless-stopped
    ports:
      - "${HTTPS_PORT:-443}:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - guardian
      - guardian-engine

volumes:
  guardian-postgres-data:
  guardian-engine-certs:
  caddy_data:
